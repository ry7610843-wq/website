<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Novel Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="login.css">


</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <a href="../index.html">
                <h1>Novel <span>store</span></h1>
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="/index.html">Home</a></li>
            <li><a href="/About/about.html">About</a></li>
            <li><a href="/Best Sellers/Best Sellers.html">Best Sellers</a></li>
        </ul>
        <div class="nav-actions">
            <div class="auth-links">
                <a href="login.html" class="active">Login</a> <span style="color:#ccc;">|</span> <a
                    href="/Register/register.html">Register</a>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <main class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-image">
                <h2>Welcome Back!</h2>
                <p>Login to access your library, continue reading, and discover new favorite novels.</p>
            </div>

            <div class="auth-form-container">
                <h3>Login</h3>
                <p>Please enter your credentials.</p>

                <form action="#">
                    <div class="input-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" placeholder="example@email.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" placeholder="Enter your password" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label><input type="checkbox"> Remember me</label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-submit">Sign In</button>
                </form>

                <div class="auth-switch">
                    Don't have an account? <a href="/Register/register.html">Create one now</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Novel Store. All rights reserved.</p>
    </footer>

</body>

</html>
